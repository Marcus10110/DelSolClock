# Render Blueprint for the Del Sol Clock web app.
# https://render.com/docs/blueprint-spec
#
# Deploys webapp/ as a free static site. Custom domain (delsol.markgarrison.io)
# and managed HTTPS are configured in the Render dashboard after the first deploy
# (see DEPLOY.md). HTTPS is required for Web Bluetooth, and Render provisions it
# automatically for custom domains.
services:
  - type: web
    runtime: static
    name: delsol-clock
    # Build from the webapp subdirectory of the repo.
    rootDir: webapp
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # Auto-deploy on push to the default branch.
    autoDeployTrigger: commit

    headers:
      # Authoritative CSP (the index.html <meta> tag is a fallback). Keep these
      # two in sync with the CSP in vite.config.ts.
      - path: /*
        name: Content-Security-Policy
        value: >-
          default-src 'self';
          script-src 'self';
          style-src 'self' 'unsafe-inline';
          img-src 'self' data: https://api.mapbox.com;
          font-src 'self';
          manifest-src 'self';
          worker-src 'self';
          connect-src 'self' https://api.github.com https://delsolapi.markgarrison.io https://api.mapbox.com;
          base-uri 'self';
          form-action 'self';
          frame-ancestors 'none';
          upgrade-insecure-requests
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: no-referrer
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Permissions-Policy
        # Allow this origin to use Web Bluetooth; deny other powerful features.
        value: "bluetooth=(self), camera=(), microphone=(), geolocation=()"
      - path: /*
        name: Strict-Transport-Security
        value: "max-age=31536000; includeSubDomains"

    routes:
      # SPA fallback: serve index.html for unknown paths (single-page app).
      # Real asset files are served directly; this only catches client routes.
      - type: rewrite
        source: /*
        destination: /index.html

  # Del Sol Clock backend API. Currently a CORS proxy for GitHub release-asset
  # downloads (the static frontend can't read GitHub's CDN responses directly — no
  # CORS header on the final asset response — so this service fetches them
  # server-side and re-serves with CORS), but named generically so other backend
  # needs can live here later. Kept on the free tier; it cold-starts after idling,
  # so the frontend pings /healthz on load + on connect to warm it before a download.
  #
  # Custom domain: delsolapi.markgarrison.io is added via the Render dashboard
  # (Blueprints can't declare custom domains), with the DNS CNAME pointed at the
  # service per Render's instructions. That domain is what the frontend calls
  # (API_BASE) and what the connect-src CSP above allows; the default
  # <name>.onrender.com URL still works but isn't referenced by the app.
  - type: web
    runtime: node
    name: delsol-api
    plan: free
    rootDir: api
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /healthz
